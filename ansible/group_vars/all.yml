# Généré automatiquement par l'orchestrateur depuis config.yml
---
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/migration_key
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
staging_dir: "/tmp/migration"
internal_subnet: "10.10.10.0/24"
new_ips:
  apache: "10.10.10.10"
  backup: "10.10.10.20"
  ftp: "10.10.10.30"
  mariadb: "10.10.10.40"
  nfs: "10.10.10.50"
