---
# ─── Installation des paquets par service ────────────────────────────────────

- name: Provisionnement commun
  hosts: all
  become: true
  tasks:
    - name: Mise à jour du cache apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installation des paquets communs
      apt:
        name:
          - curl
          - rsync
          - ca-certificates
        state: present

- name: Provisionnement MariaDB
  hosts: mariadb
  become: true
  tasks:
    - name: Installation MariaDB
      apt:
        name:
          - mariadb-server
          - mariadb-client
          - python3-pymysql
        state: present

    - name: Démarrage MariaDB
      service:
        name: mariadb
        state: started
        enabled: true

- name: Provisionnement Apache
  hosts: apache
  become: true
  tasks:
    - name: Installation Apache + PHP
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
          - php-curl
        state: present

    - name: Démarrage Apache
      service:
        name: apache2
        state: started
        enabled: true

- name: Provisionnement Backup
  hosts: backup
  become: true
  tasks:
    - name: Installation mariadb-client + cron
      apt:
        name:
          - mariadb-client
          - cron
        state: present

    - name: Démarrage cron
      service:
        name: cron
        state: started
        enabled: true

- name: Provisionnement FTP
  hosts: ftp
  become: true
  tasks:
    - name: Installation vsftpd
      apt:
        name:
          - vsftpd
          - cron
        state: present

    - name: Démarrage vsftpd
      service:
        name: vsftpd
        state: started
        enabled: true

- name: Provisionnement NFS
  hosts: nfs
  become: true
  tasks:
    - name: Installation nfs-kernel-server
      apt:
        name:
          - nfs-kernel-server
          - nfs-common
          - cron
        state: present

    - name: Démarrage nfs-kernel-server
      service:
        name: nfs-kernel-server
        state: started
        enabled: true
